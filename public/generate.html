<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generating report · Reelytics</title>
  <style>
    :root { --bg:#0a0a0f; --card:#15151f; --card-2:#1c1c28; --border:#2a2a38; --text:#f5f5f7; --muted:#9a9aae; --accent:#8b7cff; --accent-2:#c084fc; --good:#4ade80; --warn:#fb923c; --bad:#f87171; --tool:#60a5fa; }
    body { margin:0; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
    .wrap { max-width:880px; margin:0 auto; padding:48px 24px; }
    .header { display:flex; align-items:center; gap:14px; margin-bottom:24px; }
    .logo-dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-2)); }
    .header h1 { margin:0; font-size:1.05rem; font-weight:700; letter-spacing:-0.01em; }
    .header .crumb { color:var(--muted); font-size:0.95rem; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:22px; padding:28px; }
    .title-row { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; flex-wrap:wrap; }
    .title-row h2 { margin:0; font-size:1.5rem; letter-spacing:-0.02em; }
    .status-chip { display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border-radius:999px; background:var(--card-2); border:1px solid var(--border); font-size:0.85rem; font-weight:600; }
    .status-chip .dot { width:8px; height:8px; border-radius:50%; background:var(--warn); animation:pulse 1.4s ease-in-out infinite; }
    .status-chip.done .dot { background:var(--good); animation:none; }
    .status-chip.failed .dot { background:var(--bad); animation:none; }
    @keyframes pulse { 0%, 100% { opacity:1; } 50% { opacity:0.3; } }
    .sub { color:var(--muted); margin:0 0 24px; font-size:0.95rem; }

    .log { background:var(--bg); border:1px solid var(--border); border-radius:14px; padding:16px 18px; max-height:60vh; overflow-y:auto; font-family:'SF Mono',Menlo,Monaco,monospace; font-size:0.86rem; line-height:1.6; }
    .log-line { display:flex; gap:10px; padding:2px 0; }
    .log-time { color:#5a5a72; flex-shrink:0; }
    .log-level { flex-shrink:0; width:48px; font-weight:700; }
    .log-level.info { color:var(--muted); }
    .log-level.tool { color:var(--tool); }
    .log-level.warn { color:var(--warn); }
    .log-level.error { color:var(--bad); }
    .log-msg { color:#d8d8e8; word-break:break-word; }

    .footer { display:flex; gap:12px; margin-top:24px; flex-wrap:wrap; }
    .btn { padding:12px 22px; border-radius:999px; border:none; font-weight:700; cursor:pointer; font-family:inherit; font-size:0.95rem; }
    .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:white; }
    .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }

    .err { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:var(--bad); padding:14px 16px; border-radius:14px; margin-top:16px; font-size:0.92rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <span class="logo-dot"></span>
      <h1>Reelytics</h1>
      <span class="crumb">· Report generation</span>
    </div>

    <div class="card">
      <div class="title-row">
        <h2 id="title">Generating your report…</h2>
        <span id="statusChip" class="status-chip"><span class="dot"></span><span id="statusText">Running</span></span>
      </div>
      <p class="sub" id="sub">Calling Composio + Claude to fetch your last 30 days of reels. Keep this tab open — it streams every step.</p>
      <div class="log" id="log"></div>
      <div id="err" class="err" style="display:none;"></div>
      <div class="footer">
        <a class="btn btn-primary" id="openDashboard" href="/app">Open dashboard</a>
        <button class="btn btn-ghost" id="closeBtn">Close tab</button>
      </div>
    </div>
  </div>

  <script>
    const jobId = new URLSearchParams(window.location.search).get('jobId');
    const $ = (id) => document.getElementById(id);

    function fmtTime(iso) {
      try { const d = new Date(iso); return d.toLocaleTimeString('en-GB', { hour12: false }); } catch { return iso; }
    }
    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function appendLog({ level, message, timestamp }) {
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="log-time">${fmtTime(timestamp)}</span><span class="log-level ${level}">${level}</span><span class="log-msg">${escapeHtml(message)}</span>`;
      const log = $('log');
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }
    function setStatus(status, label) {
      const chip = $('statusChip');
      chip.className = 'status-chip ' + (status === 'done' ? 'done' : status === 'failed' ? 'failed' : '');
      $('statusText').textContent = label;
    }

    if (!jobId) {
      $('title').textContent = 'Missing job id';
      $('sub').textContent = 'This page expects a ?jobId= parameter.';
    } else {
      const es = new EventSource(`/api/report/stream?jobId=${encodeURIComponent(jobId)}`);
      es.addEventListener('status', () => {});
      es.addEventListener('log', (e) => { try { appendLog(JSON.parse(e.data)); } catch {} });
      es.addEventListener('done', (e) => {
        es.close();
        setStatus('done', 'Done');
        $('title').textContent = 'Report ready';
        $('sub').textContent = 'Saved to your dashboard.';
        try { window.opener?.postMessage({ type: 'reelytics:report-done', ...JSON.parse(e.data) }, '*'); } catch {}
      });
      es.addEventListener('failed', (e) => {
        es.close();
        setStatus('failed', 'Failed');
        $('title').textContent = 'Report failed';
        $('sub').textContent = 'Something went wrong. See details below.';
        try {
          const data = JSON.parse(e.data);
          $('err').style.display = 'block';
          $('err').textContent = data.error || 'Unknown error';
        } catch {}
      });
      es.onerror = () => { /* the stream closes after done/failed — that's normal */ };
    }

    $('closeBtn').addEventListener('click', () => window.close());
  </script>
</body>
</html>
